name: life_threads
description: "A private animated memory wall for photos, places, and life stories."
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.0
  photo_manager: ^3.7.1
  path_provider: ^2.1.5
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  drift: ^2.30.0
  sqlite3_flutter_libs: ^0.5.40
  path: ^1.9.1
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  archive: ^4.0.9
  file_picker: ^11.0.2
  package_info_plus: ^9.0.1
  in_app_purchase: ^3.2.3
  url_launcher: ^6.3.2
  cryptography: ^2.7.0
  share_plus: ^12.0.2
  app_links: ^7.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.30.0
  build_runner: ^2.10.4

flutter:
  uses-material-design: true
